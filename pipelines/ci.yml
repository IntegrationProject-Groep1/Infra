name: CI Pipeline

on:
  push:
    branches: [ "main", "dev", "prod" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev", "prod" ]
  workflow_dispatch:

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config -q

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          hide-progress: true
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          hide-progress: true
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true
