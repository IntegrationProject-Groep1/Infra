apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: shift-festival
data:
  rabbitmq.conf: |
    loopback_users.guest = false
    listeners.tcp.default = 5672
    management.tcp.port = 15672
    load_definitions = /etc/rabbitmq/definitions.json
---
# NOTE: RabbitMQ user passwords must NOT be stored here.
# Create a Secret named 'rabbitmq-definitions' from setup/.env instead:
#   kubectl create secret generic rabbitmq-definitions \
#     --from-file=definitions.json=setup/definitions.json \
#     -n shift-festival
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kassa-nginx-config
  namespace: shift-festival
data:
  default.conf: |
    server {
        listen 80;
        # Block access to the Odoo database manager — publicly accessible and dangerous
        location /web/database/manager {
            deny all;
            return 403;
        }
        location / {
            proxy_pass             http://kassa-web-service:8069;
            proxy_set_header       Host $http_host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       X-Forwarded-Host $http_host;
            proxy_redirect         off;
            proxy_buffering        off;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: shift-festival
data:
  default.conf: |
    server {
        listen 80;
        location / {
            proxy_pass         http://frontend-drupal-service:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Port 443;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facturatie-nginx-config
  namespace: shift-festival
data:
  default.conf: |
    server {
        listen 80;
        location / {
            proxy_pass         http://facturatie-app-service:80;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect     https:// http://;
        }
    }
