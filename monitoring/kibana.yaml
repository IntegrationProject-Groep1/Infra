apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: setup-kibana-user
        image: curlimages/curl:8.7.1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: ELASTIC_PASSWORD
        command:
        - sh
        - -c
        - |
          until curl -s -o /dev/null -w "%{http_code}" http://elasticsearch-service:9200 | grep -q "200\|401"; do
            echo "Waiting for Elasticsearch..."
            sleep 5
          done
          curl -s -X POST -u "elastic:${ELASTIC_PASSWORD}" \
            -H "Content-Type: application/json" \
            http://elasticsearch-service:9200/_security/user/kibana_system/_password \
            -d "{\"password\":\"${ELASTIC_PASSWORD}\"}"
          echo "kibana_system password configured"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.17.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 5601
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch-service:9200"
        - name: ELASTICSEARCH_USERNAME
          value: "kibana_system"
        - name: ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: ELASTIC_PASSWORD
        - name: SERVER_PUBLICBASEURL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: KIBANA_PUBLIC_BASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: kibana-data
          mountPath: /usr/share/kibana/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: kibana-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kibana-service
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30061
