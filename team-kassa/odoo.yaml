apiVersion: apps/v1
kind: Deployment
metadata:
  name: kassa-web
  namespace: shift-festival
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kassa-web
  template:
    metadata:
      labels:
        app: kassa-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: odoo
        image: odoo:17
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        args:
        - "-d"
        - "odoo_kassa"
        - "--db_host=kassa-db-service"
        - "--db_port=5432"
        - "--db-filter=^odoo_kassa$"
        - "--proxy-mode"
        ports:
        - containerPort: 8069
        env:
        - name: HOST
          value: "kassa-db-service"
        - name: USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_USER
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: odoo-data
          mountPath: /var/lib/odoo
        - name: tmp
          mountPath: /tmp
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: SYSTEM_NAME
          value: "kassa"
        - name: TARGETS
          value: "localhost:8069"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQKASSA_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQKASSA_PASS
      volumes:
      - name: odoo-data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kassa-web-service
  namespace: shift-festival
spec:
  selector:
    app: kassa-web
  ports:
    - port: 8069
      targetPort: 8069
  type: ClusterIP
