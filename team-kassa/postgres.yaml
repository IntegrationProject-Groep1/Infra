apiVersion: apps/v1
kind: Deployment
metadata:
  name: kassa-db
  namespace: shift-festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kassa-db
  template:
    metadata:
      labels:
        app: kassa-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        fsGroup: 70
      containers:
      - name: postgres
        image: postgres:14-alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "odoo_kassa"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: tmp
          mountPath: /tmp
        - name: run-postgres
          mountPath: /var/run/postgresql
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kassa-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-postgres
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kassa-db-service
  namespace: shift-festival
spec:
  selector:
    app: kassa-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
