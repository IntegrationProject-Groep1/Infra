apiVersion: apps/v1
kind: Deployment
metadata:
  name: kassa-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kassa-db
  template:
    metadata:
      labels:
        app: kassa-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: POSTGRES_DB
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kassa-db-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kassa-db-service
spec:
  selector:
    app: kassa-db
  ports:
    - port: 5432
      targetPort: 5432
