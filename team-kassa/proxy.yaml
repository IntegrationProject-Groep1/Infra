apiVersion: apps/v1
kind: Deployment
metadata:
  name: kassa-proxy
  namespace: shift-festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kassa-proxy
  template:
    metadata:
      labels:
        app: kassa-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
      - name: nginx
        image: nginx:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: kassa-nginx-config
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kassa-proxy-service
  namespace: shift-festival
spec:
  type: NodePort
  selector:
    app: kassa-proxy
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30030
