apiVersion: apps/v1
kind: Deployment
metadata:
  name: kassa-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kassa-proxy
  template:
    metadata:
      labels:
        app: kassa-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: kassa-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: kassa-proxy-service
spec:
  type: NodePort
  selector:
    app: kassa-proxy
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30030
