server {
    listen 80;
    listen [::]:80;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block access to the Odoo database manager — publicly accessible and dangerous
    location /web/database/manager {
        deny all;
        return 403;
    }

    location / {
        # Internal routing to the Odoo container
        proxy_pass http://kassa-web:8069;

        # Standard headers to ensure Odoo knows its public URL and port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Host $host;
        # Rewrite any HTTP redirects from Odoo to HTTPS
        proxy_redirect http:// https://;
    }
}
