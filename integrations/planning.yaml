apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-planning
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planning
  template:
    metadata:
      labels:
        app: planning
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: planning
        image: ghcr.io/integrationproject-groep1/planning:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 3000
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_USER_PLANNING
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_PASS_PLANNING
        - name: RABBITMQ_VHOST
          value: "/"
        - name: DB_HOST
          value: "planning-db-service"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_PASSWORD
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: AZURE_CLIENT_ID
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: AZURE_CLIENT_SECRET
        - name: TOKEN_CACHE_FILE
          value: "/app/data/token_cache.json"
        - name: API_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: API_TOKEN_SECRET
        - name: TOKEN_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TOKEN_ENCRYPTION_KEY
        - name: TEAMS_WEBHOOK_PLANNING
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TEAMS_WEBHOOK_PLANNING
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: token-data
          mountPath: /app/data
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: SYSTEM_NAME
          value: "planning"
        - name: TARGETS
          value: "localhost:3000"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_USER_PLANNING
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_PASS_PLANNING
      volumes:
      - name: token-data
        persistentVolumeClaim:
          claimName: planning-token-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: planning-service
spec:
  type: NodePort
  selector:
    app: planning
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planning-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planning-db
  template:
    metadata:
      labels:
        app: planning-db
    spec:
      securityContext:
        fsGroup: 70
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data && chown -R 70:70 /var/lib/postgresql/data"]
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: postgres:16-alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PLANNING_DB_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: tmp
          mountPath: /tmp
        - name: run-postgres
          mountPath: /var/run/postgresql
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: planning-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-postgres
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: planning-db-service
spec:
  selector:
    app: planning-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
