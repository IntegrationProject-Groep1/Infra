apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-crm
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm
  template:
    metadata:
      labels:
        app: crm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: crm
        image: ghcr.io/integrationproject-groep1/crm:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQCRM_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQCRM_PASSRAW
        - name: RABBITMQ_VHOST
          value: "/"
        - name: SF_INSTANCE_URL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SF_INSTANCE_URL
        - name: SF_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SF_CLIENT_ID
        - name: SF_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SF_CLIENT_SECRET
        - name: SF_REFRESH_TOKEN
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SF_REFRESH_TOKEN
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SUPABASE_URL
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: SUPABASE_ANON_KEY
        - name: MYSQL_HOST
          value: "crm-db-service"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_PASSWORD
        - name: TEAMS_WEBHOOK_CRM
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TEAMS_WEBHOOK_CRM
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: SYSTEM_NAME
          value: "crm"
        - name: TARGETS
          value: "localhost:3000"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQCRM_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQCRM_PASSRAW
---
apiVersion: v1
kind: Service
metadata:
  name: crm-receiver-service
spec:
  type: NodePort
  selector:
    app: crm
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-db
  template:
    metadata:
      labels:
        app: crm-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
      - name: mysql
        image: mysql:8.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_RANDOM_ROOT_PASSWORD
          value: "1"
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: MYSQL_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: tmp
          mountPath: /tmp
        - name: run-mysql
          mountPath: /var/run/mysqld
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: crm-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-mysql
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crm-db-service
spec:
  selector:
    app: crm-db
  ports:
    - port: 3306
      targetPort: 3306
