# =============================================================================
# deploy.yml
# ShiftFestival - Infra Team
#
# PURPOSE:
#   Deploys the Kubernetes stack to the Azure VM on every push to main after
#   CI passes, or on manual trigger. After applying the manifests it runs
#   rollout checks and notifies Teams on success or failure.
# =============================================================================

name: Deploy Infra to Kubernetes

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VM via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 60022
          source: "./*"
          target: "shiftfestival1.0"
          exclude: ".github,assets,README.md,*.md,CLAUDE.md,DOCUMENTATION.md,SECURITY.md"

      - name: Verify kubectl is available on the VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 60022
          script: |
            command -v kubectl >/dev/null 2>&1 || { echo "kubectl is not installed on the VM"; exit 1; }

      - name: Apply manifests and wait for rollouts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 60022
          script: |
            set -euo pipefail
            cd shiftfestival1.0

            if [[ ! -f setup/.env ]]; then
              echo "setup/.env is missing on the VM. Create it before deploying."
              exit 1
            fi

            kubectl apply -k .

            kubectl rollout status deployment/rabbitmq-broker -n shift-festival --timeout=10m
            kubectl rollout status deployment/postgredb -n shift-festival --timeout=10m
            kubectl rollout status deployment/frontend-db -n shift-festival --timeout=10m
            kubectl rollout status deployment/frontend-drupal -n shift-festival --timeout=10m
            kubectl rollout status deployment/frontend-proxy -n shift-festival --timeout=10m
            kubectl rollout status deployment/kassa-db -n shift-festival --timeout=10m
            kubectl rollout status deployment/kassa-web -n shift-festival --timeout=10m
            kubectl rollout status deployment/kassa-proxy -n shift-festival --timeout=10m
            kubectl rollout status deployment/kassa-integration -n shift-festival --timeout=10m
            kubectl rollout status deployment/facturatie-db -n shift-festival --timeout=10m
            kubectl rollout status deployment/facturatie-app -n shift-festival --timeout=10m
            kubectl rollout status deployment/facturatie-connector -n shift-festival --timeout=10m
            kubectl rollout status deployment/facturatie-proxy -n shift-festival --timeout=10m
            kubectl rollout status deployment/cloudflared -n shift-festival --timeout=10m
            kubectl rollout status deployment/integration-crm -n shift-festival --timeout=10m
            kubectl rollout status deployment/identity-service -n shift-festival --timeout=10m
            kubectl rollout status deployment/integration-planning -n shift-festival --timeout=10m
            kubectl rollout status deployment/kibana -n shift-festival --timeout=10m
            kubectl rollout status deployment/logstash -n shift-festival --timeout=10m
            kubectl rollout status deployment/monitoring-agent -n shift-festival --timeout=10m
            kubectl rollout status statefulset/elasticsearch -n shift-festival --timeout=10m

            kubectl get pods -n shift-festival
            kubectl get svc -n shift-festival

      - name: Notify Teams - deploy success
        if: success()
        run: |
          COMMIT_SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"

          PAYLOAD=$(cat <<'TEAMS_EOF'
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "contentUrl": null,
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "text": "✅ Deploy successful – Kubernetes rollout",
                    "weight": "Bolder",
                    "size": "Medium",
                    "color": "Good",
                    "wrap": true
                  },
                  {
                    "type": "TextBlock",
                    "text": "Branch: REF_PLACEHOLDER | Commit: SHA_PLACEHOLDER | By: ACTOR_PLACEHOLDER",
                    "isSubtle": true,
                    "size": "Small",
                    "wrap": true
                  },
                  {
                    "type": "TextBlock",
                    "text": "The Kubernetes manifests were applied successfully and the main workloads became ready.",
                    "wrap": true,
                    "isSubtle": true,
                    "spacing": "Medium"
                  }
                ]
              }
            }]
          }
          TEAMS_EOF
          )

          PAYLOAD="${PAYLOAD//REF_PLACEHOLDER/$REF}"
          PAYLOAD="${PAYLOAD//SHA_PLACEHOLDER/${COMMIT_SHA:0:7}}"
          PAYLOAD="${PAYLOAD//ACTOR_PLACEHOLDER/$ACTOR}"

          if [[ -n "${{ secrets.TEAMS_WEBHOOK_INFRA }}" ]]; then
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${{ secrets.TEAMS_WEBHOOK_INFRA }}"
          fi

      - name: Collect cluster status on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 60022
          script: |
            cd shiftfestival1.0
            kubectl get pods -A
            kubectl get events -A --sort-by=.metadata.creationTimestamp | tail -50

      - name: Notify Teams - deploy failed
        if: failure()
        run: |
          COMMIT_SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"

          PAYLOAD=$(cat <<'TEAMS_EOF'
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "contentUrl": null,
              "content": {
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "text": "❌ Deploy failed – Kubernetes rollout",
                    "weight": "Bolder",
                    "size": "Medium",
                    "color": "Attention",
                    "wrap": true
                  },
                  {
                    "type": "TextBlock",
                    "text": "Branch: REF_PLACEHOLDER | Commit: SHA_PLACEHOLDER | By: ACTOR_PLACEHOLDER",
                    "isSubtle": true,
                    "size": "Small",
                    "wrap": true
                  },
                  {
                    "type": "TextBlock",
                    "text": "The manifest apply or a rollout check failed. Review the Actions log and cluster status output.",
                    "wrap": true,
                    "isSubtle": true,
                    "spacing": "Medium"
                  }
                ]
              }
            }]
          }
          TEAMS_EOF
          )

          PAYLOAD="${PAYLOAD//REF_PLACEHOLDER/$REF}"
          PAYLOAD="${PAYLOAD//SHA_PLACEHOLDER/${COMMIT_SHA:0:7}}"
          PAYLOAD="${PAYLOAD//ACTOR_PLACEHOLDER/$ACTOR}"

          if [[ -n "${{ secrets.TEAMS_WEBHOOK_INFRA }}" ]]; then
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${{ secrets.TEAMS_WEBHOOK_INFRA }}"
          fi
