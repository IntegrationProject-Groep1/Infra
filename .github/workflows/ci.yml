# =============================================================================
# ci.yml
# ShiftFestival - Infra Team
#
# PURPOSE:
#   Validates the Infra repository on every push and pull request.
#   Catches configuration errors, security issues, and bad practices
#   BEFORE they reach the VM / Kubernetes cluster.
#
# JOBS:
#   1. validate - Kustomize rendering and YAML syntax checks
#   2. lint     - Bash script linting with shellcheck
#   3. security - Secret scanning and Kubernetes misconfiguration checks
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: ["main", "dev", "prod", "fix/ci"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "dev", "prod", "fix/ci"]
  workflow_dispatch:

jobs:
  validate:
    name: Validate configuration files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.1

      - name: Render Kubernetes manifests
        shell: bash
        run: |
          cat > setup/.env <<'EOF'
          RABBITMQ_DEFAULT_USER=ci_placeholder
          RABBITMQ_DEFAULT_PASS=ci_placeholder
          DB_USER=ci_placeholder
          DB_PASSWORD=ci_placeholder
          DB_NAME=ci_placeholder
          PGADMIN_EMAIL=ci@placeholder.com
          PGADMIN_PASSWORD=ci_placeholder
          DRUPAL_DB_ROOT_PASS=ci_placeholder
          DRUPAL_DB_NAME=drupal
          DRUPAL_DB_USER=drupal_user
          DRUPAL_DB_PASS=ci_placeholder
          DRUPAL_BASE_URL=https://ci.placeholder.com
          RABBITMQFRONTEND_USER=ci_placeholder
          RABBITMQFRONTEND_PASS=ci_placeholder
          RABBITMQMONITORING_USER=ci_placeholder
          RABBITMQMONITORING_PASS=ci_placeholder
          RABBITMQFACTURATIE_USER=ci_placeholder
          RABBITMQFACTURATIE_PASS=ci_placeholder
          RABBITMQKASSA_USER=ci_placeholder
          RABBITMQKASSA_PASS=ci_placeholder
          RABBITMQCRM_USER=ci_placeholder
          RABBITMQCRM_PASSRAW=ci_placeholder
          RABBITMQPLANNING_USER=ci_placeholder
          RABBITMQPLANNING_PASS=ci_placeholder
          FOSSBILLING_DB_NAME=ci_placeholder
          FOSSBILLING_DB_USER=ci_placeholder
          FOSSBILLING_DB_PASS=ci_placeholder
          POSTGRES_DB=ci_placeholder
          POSTGRES_PASSWORD=ci_placeholder
          POSTGRES_USER=ci_placeholder
          ODOO_URL=http://ci.placeholder.com
          ODOO_DB=ci_placeholder
          ODOO_USER=ci_placeholder
          ODOO_PASS=ci_placeholder
          ODOO_MASTER_PASS=ci_placeholder
          RABBIT_HOST=ci_placeholder
          RABBIT_PORT=5672
          RABBIT_VHOST=/
          RABBIT_AUTO_SETUP_TOPOLOGY=false
          RABBIT_EXCHANGE=ci_placeholder
          RABBIT_INCOMING_QUEUE=ci_placeholder
          POLL_INTERVAL=10
          SF_INSTANCE_URL=https://ci.placeholder.com
          SF_CLIENT_ID=ci_placeholder
          SF_CLIENT_SECRET=ci_placeholder
          SF_REFRESH_TOKEN=ci_placeholder
          MYSQL_HOST=ci_placeholder
          MYSQL_PORT=3306
          MYSQL_DATABASE=ci_placeholder
          MYSQL_USER=ci_placeholder
          MYSQL_PASSWORD=ci_placeholder
          ES_ADMIN_PASS=ci_placeholder
          ELASTIC_PASSWORD=ci_placeholder
          KIBANA_PUBLIC_BASE_URL=https://ci.placeholder.com
          AZURE_CLIENT_ID=ci_placeholder
          AZURE_CLIENT_SECRET=ci_placeholder
          API_TOKEN_SECRET=ci_placeholder
          TOKEN_ENCRYPTION_KEY=ci_placeholder
          TEAMS_WEBHOOK_INFRA=https://ci.placeholder.com
          TEAMS_WEBHOOK_FRONTEND=https://ci.placeholder.com
          TEAMS_WEBHOOK_KASSA=https://ci.placeholder.com
          TEAMS_WEBHOOK_CRM=https://ci.placeholder.com
          TEAMS_WEBHOOK_PLANNING=https://ci.placeholder.com
          TEAMS_WEBHOOK_FACTURATIE=https://ci.placeholder.com
          TEAMS_WEBHOOK_MONITORING=https://ci.placeholder.com
          BILLING_API_URL=https://ci.placeholder.com
          SUPABASE_URL=https://ci.placeholder.com
          SUPABASE_ANON_KEY=ci_placeholder
          EOF

          kubectl kustomize . > "${RUNNER_TEMP}/rendered-manifests.yaml"
          rm -f setup/.env
          echo "✅ Kustomize render completed"

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Lint YAML files
        shell: bash
        run: |
          find . \
            -type f \
            \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./.git/*" \
            -print0 \
            | xargs -0 yamllint -d "{
              extends: relaxed,
              rules: {
                line-length: {max: 300},
                truthy: disable,
                comments: disable,
                comments-indentation: disable,
                indentation: disable,
                braces: disable,
                brackets: disable,
                colons: disable,
                commas: disable,
                document-start: disable,
                empty-lines: disable,
                new-line-at-end-of-file: disable,
                trailing-spaces: disable
              }
            }"

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        shell: bash
        run: |
          while IFS= read -r script; do
            shellcheck --exclude=SC2034,SC1091 --severity=warning "${script}"
          done < <(find scripts -name "*.sh" -type f)

  security:
    name: Security scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan Kubernetes manifests with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: HIGH,CRITICAL
          format: table

      - name: Verify sensitive files are not committed
        shell: bash
        run: |
          COMMITTED_ENV=$(git ls-files | grep -E '(^|/)\.env$|(^|/)setup/\.env$' || true)
          if [[ -n "${COMMITTED_ENV}" ]]; then
            echo "❌ .env files must not be committed"
            echo "${COMMITTED_ENV}"
            exit 1
          fi
          echo "✅ No .env files are tracked"

      - name: Check for hardcoded credentials
        shell: bash
        run: |
          ERRORS=0
          while IFS= read -r pattern; do
            matches=$(grep -rEi "${pattern}" \
              --include="*.yml" \
              --include="*.yaml" \
              --include="*.conf" \
              --include="*.sh" \
              --exclude-dir=".git" \
              --exclude-dir=".github" \
              --exclude="*.example" \
              . 2>/dev/null || true)
            if [[ -n "${matches}" ]]; then
              echo "❌ Potential hardcoded secret found:"
              echo "${matches}"
              ERRORS=$((ERRORS + 1))
            fi
          done <<'EOF'
          [Pp]assword\s*[:=]\s*[A-Za-z0-9_@./-]{6,}
          [Tt]oken\s*[:=]\s*[A-Za-z0-9_@./-]{10,}
          [Ss]ecret\s*[:=]\s*[A-Za-z0-9_@./-]{10,}
          EOF

          if [[ ${ERRORS} -gt 0 ]]; then
            exit 1
          fi

      - name: Check for obvious Kubernetes misconfigurations
        shell: bash
        run: |
          echo "Checking for privileged containers and dangerous host ports..."

          if grep -RIn "privileged:[[:space:]]*true" --include="*.yml" --include="*.yaml" .; then
            echo "❌ CRITICAL: privileged containers are not allowed"
            exit 1
          fi

          if grep -RInE 'nodePort:[[:space:]]*22|hostPort:[[:space:]]*22' --include="*.yml" --include="*.yaml" .; then
            echo "❌ CRITICAL: SSH must not be exposed through Kubernetes services"
            exit 1
          fi

          echo "✅ No obvious misconfigurations found"
