apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-drupal
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-drupal
  template:
    metadata:
      labels:
        app: frontend-drupal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: drupal
        image: ghcr.io/integrationproject-groep1/ip-groep1-frontend:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 80
        env:
        - name: DRUPAL_DB_HOST
          value: "frontend-db-service"
        - name: DRUPAL_DB_PORT
          value: "3306"
        - name: DRUPAL_DB_NAME
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_NAME
        - name: DRUPAL_DB_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_USER
        - name: DRUPAL_DB_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_PASS
        - name: DRUPAL_DB_PASSWORD 
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_PASS
        - name: MARIADB_HOST
          value: "frontend-db-service"
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_NAME
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_USER
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_PASS
        - name: DRUPAL_BASE_URL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_BASE_URL
        - name: DRUPAL_REVERSE_PROXY
          value: "true"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_VHOST
          value: "/"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFRONTEND_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFRONTEND_PASS
        - name: RABBITMQFRONTEND_PREFIX
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFRONTEND_PREFIX
        - name: TEAMS_WEBHOOK_FRONTEND
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TEAMS_WEBHOOK_FRONTEND
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: drupal-files
          mountPath: /var/www/html/sites/default/files
        - name: drupal-settings
          mountPath: /var/www/html/sites/default/settings.php
          subPath: settings.php
        - name: rabbitmq-sender-services
          mountPath: /var/www/html/modules/custom/rabbitmq_sender/rabbitmq_sender.services.yml
          subPath: rabbitmq_sender.services.yml
        - name: apache-run
          mountPath: /var/run/apache2
        - name: apache-log
          mountPath: /var/log/apache2
        - name: apache-lock
          mountPath: /var/lock/apache2
        - name: tmp
          mountPath: /tmp
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: SYSTEM_NAME
          value: "frontend"
        - name: TARGETS
          value: "localhost:80"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFRONTEND_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFRONTEND_PASS
      volumes:
      - name: drupal-files
        persistentVolumeClaim:
          claimName: frontend-drupal-files-pvc
      - name: drupal-settings
        configMap:
          name: frontend-drupal-settings
      - name: rabbitmq-sender-services
        configMap:
          name: frontend-rabbitmq-sender-services
      - name: apache-run
        emptyDir: {}
      - name: apache-log
        emptyDir: {}
      - name: apache-lock
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-drupal-service
spec:
  selector:
    app: frontend-drupal
  ports:
    - port: 80
      targetPort: 80
