apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-db
  template:
    metadata:
      labels:
        app: frontend-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: mariadb
        image: mariadb:10.11
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_ROOT_PASS
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_NAME
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DRUPAL_DB_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: tmp
          mountPath: /tmp
        - name: run-mysql
          mountPath: /var/run/mysqld
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: frontend-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-mysql
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-db-service
spec:
  selector:
    app: frontend-db
  ports:
    - port: 3306
      targetPort: 3306
