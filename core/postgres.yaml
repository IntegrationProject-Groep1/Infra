apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgredb
  namespace: shift-festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgredb
  template:
    metadata:
      labels:
        app: postgredb
    spec:
      securityContext:
        fsGroup: 70
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data && chown -R 70:70 /var/lib/postgresql/data"]
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: postgres:15-alpine
        securityContext:
          runAsNonRoot: true
          runAsUser: 70
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DB_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: DB_NAME
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: tmp
          mountPath: /tmp
        - name: run-postgres
          mountPath: /var/run/postgresql
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: central-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-postgres
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgredb-service
  namespace: shift-festival
spec:
  selector:
    app: postgredb
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: shift-festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin-central
  template:
    metadata:
      labels:
        app: pgadmin-central
    spec:
      securityContext:
        fsGroup: 5050
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 5050
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 80
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PGADMIN_EMAIL
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: PGADMIN_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: pgadmin-data
          mountPath: /var/lib/pgadmin
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: pgadmin-data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin-service
  namespace: shift-festival
spec:
  type: NodePort
  selector:
    app: pgadmin-central
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30004
