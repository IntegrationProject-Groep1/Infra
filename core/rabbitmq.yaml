apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-broker
  namespace: shift-festival
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      hostname: my-rabbit
      securityContext:
        runAsNonRoot: true
        fsGroup: 999
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: mgmt
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_DEFAULT_USER
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQ_DEFAULT_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: rabbit-data
          mountPath: /var/lib/rabbitmq
        - name: rabbit-config
          mountPath: /etc/rabbitmq/rabbitmq.conf
          subPath: rabbitmq.conf
          readOnly: true
        - name: rabbit-definitions
          mountPath: /etc/rabbitmq/definitions.json
          subPath: definitions.json
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: run-rabbitmq
          mountPath: /var/run/rabbitmq
        livenessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - -q
            - check_running
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - -q
            - check_running
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: rabbit-data
        persistentVolumeClaim:
          claimName: rabbitmq-data-pvc
      - name: rabbit-config
        configMap:
          name: rabbitmq-config
      - name: rabbit-definitions
        secret:
          secretName: rabbitmq-definitions
      - name: tmp
        emptyDir: {}
      - name: run-rabbitmq
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: shift-festival
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30000
    - name: mgmt
      port: 15672
      targetPort: 15672
      nodePort: 30001
