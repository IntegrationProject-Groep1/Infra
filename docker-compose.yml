# =============================================================================
# docker-compose.yml
# ShiftFestival – Infra Team
# Project: IntegrationProject-Groep1
#
# PURPOSE:
#   Defines the full ShiftFestival microservices stack running on the Azure VM
#   via Docker Compose. All services communicate over the internal "shift_net"
#   Docker network, with SSL termination handled by per-service Nginx proxies.
#
# ARCHITECTURE OVERVIEW:
#   ┌─────────────────────────────────────────────────────────┐
#   │  Azure VM (Ubuntu) – /opt/shiftfestival                 │
#   │                                                         │
#   │  [RabbitMQ]  ←──── Central message broker (AMQP)       │
#   │  [PostgreSQL] ←─── Shared identity database             │
#   │  [ELK Stack] ←──── Centralized logging & monitoring     │
#   │                                                         │
#   │  Team services: Frontend, Facturatie, Kassa,            │
#   │                 CRM, Planning, Identity                  │
#   └─────────────────────────────────────────────────────────┘
#
# PORT ALLOCATION:
#   30000 – RabbitMQ AMQP
#   30001 – RabbitMQ Management UI
#   30002 – Dozzle (log viewer)
#   30004 – PostgreSQL (shared identity DB)
#   30005 – pgAdmin UI
#   30010 – FOSSBilling (Facturatie)
#   30020 – Drupal (Frontend)
#   30030 – Odoo (Kassa)
#   30040 – CRM Receiver
#   30050 – Planning Service
#   30060 – Elasticsearch
#   30061 – Kibana
#
# STICKY ROLLBACK STRATEGY:
#   Team service images support sticky rollback via .env variables.
#   When runtime-rollback.sh detects a crash, it writes a pinned SHA digest
#   into the .env file (e.g. FRONTEND_DRUPAL_IMAGE=ghcr.io/...@sha256:...).
#   The ${SERVICE_IMAGE:-default:latest} syntax below picks up that pin
#   automatically, preventing Watchtower from re-applying the broken image.
#   On the next successful deploy, deploy.yml clears all pins from .env.
#
# WATCHTOWER LABELS:
#   watchtower.enable=true  → Automatically updated from GHCR (team images)
#   watchtower.enable=false → Pinned/infrastructure images, never auto-updated
#
# ENVIRONMENT:
#   All secrets and configuration live in /opt/shiftfestival/.env on the VM.
#   This file is NEVER committed to git. See .env.example for required keys.
# =============================================================================

services:

  # ===========================================================================
  # SECTION 1: CORE INFRASTRUCTURE
  # These services form the backbone of the platform. They are pinned to
  # specific versions and are NOT automatically updated by Watchtower.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Dozzle – Real-time Docker log viewer
  # Accessible via Nginx proxy on port 30002 (HTTPS).
  # ---------------------------------------------------------------------------
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:v8
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      # Read-only socket access so Dozzle can stream container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shift_net

  dozzle-proxy:
    container_name: dozzle_proxy
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "30002:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./dozzle-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dozzle
    networks:
      - shift_net

  # ---------------------------------------------------------------------------
  # RabbitMQ – Central message broker
  # All inter-service communication flows through this broker via AMQP.
  # Management UI accessible on port 30001 via SSL.
  # IMPORTANT: Uses a named external volume to preserve queues across restarts.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_broker
    hostname: my-rabbit
    restart: unless-stopped
    ports:
      - "30000:5672"    # AMQP data port (used by all services)
      - "30001:15671"   # Management UI (SSL, configured in rabbitmq.conf)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq          # External volume – survives redeployments
      - ./certs:/etc/rabbitmq/certs:ro
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - shift_net

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 – Shared identity database
  # Used by the Identity Service for the user_registry table.
  # Has a healthcheck so dependent services wait until it is truly ready.
  # ---------------------------------------------------------------------------
  postgredb:
    image: postgres:16-alpine
    container_name: integration_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "${EXTERNAL_DB_PORT:-30004}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - shift_net

  # ---------------------------------------------------------------------------
  # pgAdmin 4 – PostgreSQL web UI
  # For database inspection and management. Port 30005.
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: pgadmin_ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "30005:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      - postgredb
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 2: INFRA – AUTOMATION & MONITORING TOOLS
  # Internal Infra Team tools: rollback monitor and Watchtower auto-updater.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Rollback Monitor – Runtime health check and sticky rollback daemon
  # Runs scripts/runtime-rollback.sh every 30 seconds.
  # Mounts the Docker socket to inspect other containers and the full
  # /opt/shiftfestival directory to read/write .stable_tags and .env pins.
  # Logs visible in Dozzle (port 30002).
  # ---------------------------------------------------------------------------
  rollback-monitor:
    image: docker:24-cli
    container_name: rollback_monitor
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - BASE_DIR=/opt/shiftfestival
      # Teams webhook URLs for per-channel notifications on rollback events
      - TEAMS_WEBHOOK_INFRA=${TEAMS_WEBHOOK_INFRA}
      - TEAMS_WEBHOOK_FRONTEND=${TEAMS_WEBHOOK_FRONTEND}
      - TEAMS_WEBHOOK_FACTURATIE=${TEAMS_WEBHOOK_FACTURATIE}
      - TEAMS_WEBHOOK_KASSA=${TEAMS_WEBHOOK_KASSA}
      - TEAMS_WEBHOOK_CRM=${TEAMS_WEBHOOK_CRM}
      - TEAMS_WEBHOOK_PLANNING=${TEAMS_WEBHOOK_PLANNING}
      - TEAMS_WEBHOOK_MONITORING=${TEAMS_WEBHOOK_MONITORING}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock                      # Docker API access
      - /opt/shiftfestival:/opt/shiftfestival                          # Scripts and state files
      - /home/ehbstudent/.docker/config.json:/root/.docker/config.json:ro  # GHCR auth for manifest inspect
    command: >
      sh -c "apk add --no-cache bash curl jq python3 &&
             bash /opt/shiftfestival/scripts/runtime-rollback.sh"
    networks:
      - shift_net

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel – Exposes internal services to the internet via Cloudflare
  # SSL termination is handled by Cloudflare; internal services run on plain HTTP.
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    network_mode: host

  # ---------------------------------------------------------------------------
  # Watchtower – Automatic container image updater
  # Polls GHCR every 60 seconds. Only updates containers with the label
  # "com.centurylinklabs.watchtower.enable=true".
  # NOTE: Watchtower is paused/unpaused by runtime-rollback.sh during rollbacks
  # to prevent it from overwriting a rollback in progress.
  # STICKY ROLLBACK: When a service is pinned to a SHA digest in .env,
  # Watchtower has no floating tag to monitor and automatically skips it.
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    environment:
      # Prevents API version mismatch between Watchtower and the Docker host daemon
      - DOCKER_API_VERSION=1.40
      # Only update containers explicitly labelled for Watchtower management
      - WATCHTOWER_LABEL_ENABLE=true
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ehbstudent/.docker/config.json:/config.json:ro   # GHCR credentials
    command: --interval 60 --cleanup

  # ===========================================================================
  # SECTION 3: MONITORING & LOGGING – ELK STACK
  # Centralized logging pipeline: services → RabbitMQ → Logstash → Elasticsearch → Kibana
  # All ELK containers use pinned versions to avoid breaking changes.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Elasticsearch 8.17 – Log storage and search engine
  # Security (xpack) is enabled. Kibana uses a dedicated service account.
  # start_period gives ES time to initialize before healthchecks kick in.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_ADMIN_PASS}
      # JVM heap size – set ES_MEM_LIMIT in .env (e.g. 512m or 1g)
      - "ES_JAVA_OPTS=-Xms${ES_MEM_LIMIT} -Xmx${ES_MEM_LIMIT}"
    ports:
      - "30060:9200"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - shift_net   # Needed for RabbitMQ → Logstash communication
      - elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u ${ES_ADMIN_USER}:${ES_ADMIN_PASS} http://localhost:9200/_cluster/health | grep -qE 'status\":\"(green|yellow)'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s   # ES takes ~30s to initialize on first start

  # ---------------------------------------------------------------------------
  # Logstash Config – Sidecar that provides the pipeline configuration
  # Team Monitoring owns the logstash.conf inside this image (GHCR).
  # The config is shared with Logstash via a named volume.
  # Watchtower-enabled so the pipeline config updates with new monitoring pushes.
  # ---------------------------------------------------------------------------
  logstash-config:
    image: ${LOGSTASH_CONFIG_IMAGE:-ghcr.io/integrationproject-groep1/monitoring:latest}
    container_name: logstash_config
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - logstash-pipeline:/usr/share/logstash/pipeline

  # ---------------------------------------------------------------------------
  # Logstash 8.17 – Log ingestion pipeline
  # Reads heartbeat messages from RabbitMQ and writes them to Elasticsearch.
  # NOTE: logstash.conf uses ${RABBITMQMONITORING_USER} internally – both
  # RABBITMQ_USER and RABBITMQMONITORING_USER are passed for compatibility.
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: logstash
    restart: unless-stopped
    environment:
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ES_ADMIN_USER=${ES_ADMIN_USER}
      - ES_ADMIN_PASS=${ES_ADMIN_PASS}
      - RABBITMQ_HOST=${RABBIT_HOST}
      - RABBITMQ_PORT=${RABBIT_PORT}
      - RABBITMQ_VHOST=${RABBIT_VHOST}
      # Both variable names provided: RABBITMQ_USER for standard plugins,
      # RABBITMQMONITORING_USER for direct references in logstash.conf
      - RABBITMQ_USER=${RABBITMQMONITORING_USER}
      - RABBITMQ_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQMONITORING_USER=${RABBITMQMONITORING_USER}
      - RABBITMQMONITORING_PASS=${RABBITMQMONITORING_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - logstash-pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - shift_net
      - elk-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash-config:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Kibana 8.17 – Log visualization dashboard
  # Accessible via Nginx proxy on port 30061 (HTTPS).
  # Uses a dedicated kibana_system account (not the admin account).
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASS}
      - XPACK_SECURITY_ENABLED=true
      - SERVER_PUBLICBASEURL=https://kibana.desiderius.me
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  kibana-proxy:
    container_name: kibana_proxy
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "30061:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./kibana-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kibana
    networks:
      - elk-net

  # ---------------------------------------------------------------------------
  # Monitoring Heartbeat – Sidecar for the ELK stack
  # Monitors Kibana and Elasticsearch availability and sends heartbeats to
  # RabbitMQ so the Controlroom can track the monitoring stack's health.
  # ---------------------------------------------------------------------------
  monitoring-heartbeat:
    image: ${MONITORING_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: monitoring_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=monitoring
      - TARGETS=kibana:5601,elasticsearch:9200
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQMONITORING_USER}
      - RABBITMQ_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQ_VHOST=${RABBIT_VHOST:-/}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    networks:
      - shift_net
      - elk-net

  # ===========================================================================
  # SECTION 4: TEAM FRONTEND – Drupal CMS
  # Port range: 30020–30029
  # Drupal serves the public-facing event registration website.
  # Uses MariaDB as its database (separate from the shared PostgreSQL).
  # ===========================================================================

  frontend-db:
    image: mariadb:10.11
    container_name: frontend_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DRUPAL_DB_ROOT_PASS}
      MYSQL_DATABASE: ${DRUPAL_DB_NAME:-drupal}
      MYSQL_USER: ${DRUPAL_DB_USER:-drupal_user}
      MYSQL_PASSWORD: ${DRUPAL_DB_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - frontend_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shift_net

  # STICKY ROLLBACK: ${FRONTEND_DRUPAL_IMAGE} is written by runtime-rollback.sh
  # when a crash is detected. Falls back to :latest on a clean deploy.
  frontend-drupal:
    image: ${FRONTEND_DRUPAL_IMAGE:-ghcr.io/integrationproject-groep1/ip-groep1-frontend:latest}
    container_name: frontend_drupal
    restart: unless-stopped
    environment:
      DRUPAL_DB_HOST: frontend_db
      DRUPAL_DB_NAME: ${DRUPAL_DB_NAME:-drupal}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER:-drupal_user}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASS}
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQFRONTEND_USER}
      RABBITMQ_PASS: ${RABBITMQFRONTEND_PASS}
      RABBITMQ_VHOST: /
      RABBITMQ_HOST: rabbitmq_broker
      DRUPAL_REVERSE_PROXY: "true"
      DRUPAL_BASE_URL: ${DRUPAL_BASE_URL}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      # Only the files directory is mounted – themes/modules come from the image
      - frontend_drupal_files:/var/www/html/sites/default/files
    depends_on:
      frontend-db:
        condition: service_healthy
    networks:
      - shift_net

  frontend-proxy:
    container_name: frontend_proxy
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "30020:80"   # Azure external port 30020 → internal HTTP 80
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-drupal
    networks:
      - shift_net

  frontend-heartbeat:
    image: ${FRONTEND_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: frontend_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=frontend
      - TARGETS=frontend_drupal:80
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQFRONTEND_USER}
      - RABBITMQ_PASS=${RABBITMQFRONTEND_PASS}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - frontend-drupal
      - rabbitmq
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 5: TEAM FACTURATIE – FOSSBilling
  # Port range: 30010–30019
  # FOSSBilling handles invoice generation for companies attending the event.
  # A custom connector syncs invoicing events with RabbitMQ.
  # ===========================================================================

  fossbilling-db:
    image: mariadb:10.11
    container_name: fossbilling_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${FOSSBILLING_DB_NAME}
      MYSQL_USER: ${FOSSBILLING_DB_USER}
      MYSQL_PASSWORD: ${FOSSBILLING_DB_PASS}
      # Root password is randomized – app connects via MYSQL_USER, not root
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - fossbilling_db_data:/var/lib/mysql
    networks:
      - shift_net

  # FOSSBilling only has :latest available on Docker Hub – no version pinning possible
  # STICKY ROLLBACK: ${FOSSBILLING_APP_IMAGE} pin is set on crash by rollback script
  fossbilling-app:
    image: ${FOSSBILLING_APP_IMAGE:-fossbilling/fossbilling:latest}
    container_name: fossbilling_app
    restart: unless-stopped
    environment:
      DB_HOST: fossbilling_db
      DB_NAME: ${FOSSBILLING_DB_NAME}
      DB_USER: ${FOSSBILLING_DB_USER}
      DB_PASSWORD: ${FOSSBILLING_DB_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      # Recovery config is mounted to ensure the app always has valid DB credentials
      - ./config_recovery.php:/var/www/html/config.php:ro
      - fossbilling_app_data:/var/www/html/data
      - fossbilling_uploads:/var/www/html/uploads
    depends_on:
      fossbilling-db:
        condition: service_started
    networks:
      - shift_net

  # STICKY ROLLBACK: ${FOSSBILLING_CONNECTOR_IMAGE} pin is set on crash
  fossbilling-connector:
    image: ${FOSSBILLING_CONNECTOR_IMAGE:-ghcr.io/integrationproject-groep1/facturatie:latest}
    container_name: fossbilling_connector
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      BILLING_API_URL: http://fossbilling_app/api
      RABBITMQ_HOST: rabbitmq_broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQFACTURATIE_USER}
      RABBITMQ_PASSWORD: ${RABBITMQFACTURATIE_PASS}
      DB_HOST: fossbilling_db
      DB_NAME: ${FOSSBILLING_DB_NAME}
      DB_USER: ${FOSSBILLING_DB_USER}
      DB_PASSWORD: ${FOSSBILLING_DB_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - fossbilling-app
      - rabbitmq
    networks:
      - shift_net

  fossbilling-proxy:
    container_name: fossbilling_proxy
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "30010:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./fossbilling-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fossbilling-app
    networks:
      - shift_net

  fossbilling-heartbeat:
    image: ${FOSSBILLING_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: fossbilling_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=facturatie
      - TARGETS=fossbilling_app:80
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQFACTURATIE_USER}
      - RABBITMQ_PASS=${RABBITMQFACTURATIE_PASS}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - fossbilling-app
      - rabbitmq
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 6: TEAM KASSA – Odoo POS
  # Port range: 30030–30039
  # Odoo Point of Sale handles on-site payments and drink orders at the event.
  # Uses a dedicated PostgreSQL 15 database (separate from the shared one).
  # NOTE: Odoo is pinned to :latest (watchtower=false) because DB schema
  # migrations are destructive – updates must be done manually and tested.
  # ===========================================================================

  kassa-db:
    image: postgres:15
    container_name: kassa_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - kassa_db_data:/var/lib/postgresql/data
    networks:
      - shift_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Odoo is NOT Watchtower-managed: version upgrades require DB migrations.
  # Update manually by changing the image tag and running `odoo --update=all`.
  kassa-web:
    image: odoo:latest
    container_name: kassa_odoo
    restart: unless-stopped
    command: odoo -d odoo_kassa --db-filter=^odoo_kassa$
    environment:
      - HOST=kassa-db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - kassa_odoo_data:/var/lib/odoo
    depends_on:
      kassa-db:
        condition: service_healthy
    networks:
      - shift_net

  kassa-proxy:
    image: nginx:1.27-alpine
    container_name: kassa_proxy
    restart: unless-stopped
    ports:
      - "30030:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./kassa-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kassa-web
    networks:
      - shift_net

  # STICKY ROLLBACK: ${KASSA_INTEGRATIE_IMAGE} pin is set on crash
  kassa-integratie:
    image: ${KASSA_INTEGRATIE_IMAGE:-ghcr.io/integrationproject-groep1/kassa:latest}
    container_name: kassa_integratie
    restart: unless-stopped
    environment:
      - ODOO_URL=${ODOO_URL}
      - ODOO_DB=${ODOO_DB}
      - ODOO_USER=${ODOO_USER}
      - ODOO_PASS=${ODOO_PASS}
      - RABBIT_HOST=${RABBIT_HOST}
      - RABBIT_PORT=${RABBIT_PORT}
      - RABBIT_USER=${RABBITMQKASSA_USER}
      - RABBIT_PASS=${RABBITMQKASSA_PASS}
      - RABBIT_VHOST=${RABBIT_VHOST}
      - RABBIT_AUTO_SETUP_TOPOLOGY=${RABBIT_AUTO_SETUP_TOPOLOGY}
      - RABBIT_EXCHANGE=${RABBIT_EXCHANGE}
      - RABBIT_INCOMING_QUEUE=${RABBIT_INCOMING_QUEUE}
      - POLL_INTERVAL=${POLL_INTERVAL}
      - ODOO_MASTER_PASS=${ODOO_MASTER_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - kassa_outbox_data:/app/outbox
    depends_on:
      - kassa-web
    networks:
      - shift_net

  kassa-heartbeat:
    image: ${KASSA_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: kassa_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=kassa
      - TARGETS=kassa-web:8069
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQKASSA_USER}
      - RABBITMQ_PASS=${RABBITMQKASSA_PASS}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - kassa-web
      - rabbitmq
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 7: TEAM CRM – Salesforce Integration
  # Port range: 30040–30049
  # The CRM receiver worker syncs attendee data from RabbitMQ to Salesforce
  # and a local MySQL database for backup/reporting.
  # ===========================================================================

  # STICKY ROLLBACK: ${CRM_RECEIVER_IMAGE} pin is set on crash
  crm-receiver:
    image: ${CRM_RECEIVER_IMAGE:-ghcr.io/integrationproject-groep1/crm:latest}
    container_name: crm_receiver
    restart: unless-stopped
    ports:
      - "30040:3000"
    environment:
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQCRM_USER}
      # Password contains special chars – quote in .env: RABBITMQCRM_PASSRAW="pass"
      - RABBITMQ_PASS=${RABBITMQCRM_PASSRAW}
      - RABBITMQ_VHOST=/
      - SF_INSTANCE_URL=${SF_INSTANCE_URL}
      - SF_CLIENT_ID=${SF_CLIENT_ID}
      - SF_CLIENT_SECRET=${SF_CLIENT_SECRET}
      - SF_REFRESH_TOKEN=${SF_REFRESH_TOKEN}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - rabbitmq
    networks:
      - shift_net

  crm-db:
    image: mysql:8.0
    container_name: crm_db
    restart: unless-stopped
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_PORT=${MYSQL_PORT}
      # Root password randomized – app connects via MYSQL_USER only
      - MYSQL_RANDOM_ROOT_PASSWORD=1
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - crm_db_data:/var/lib/mysql
    networks:
      - shift_net

  crm-heartbeat:
    image: ${CRM_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: crm_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=crm
      - TARGETS=crm_receiver:3000
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQCRM_USER}
      - RABBITMQ_PASS=${RABBITMQCRM_PASSRAW}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - crm-receiver
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 8: TEAM PLANNING – Office 365 / Outlook Integration
  # Port range: 30050–30059
  # The planning service manages session scheduling and syncs with Outlook
  # calendars for speakers and workshop organisers.
  # ===========================================================================

  # STICKY ROLLBACK: ${PLANNING_SERVICE_IMAGE} pin is set on crash
  planning-service:
    image: ${PLANNING_SERVICE_IMAGE:-ghcr.io/integrationproject-groep1/planning:latest}
    container_name: planning_service
    restart: unless-stopped
    ports:
      - "30050:30050"
    environment:
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQPLANNING_USER}
      - RABBITMQ_PASS=${RABBITMQPLANNING_PASS}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - rabbitmq
    networks:
      - shift_net

  planning-heartbeat:
    image: ${PLANNING_HEARTBEAT_IMAGE:-ghcr.io/integrationproject-groep1/heartbeat:latest}
    container_name: planning_heartbeat
    restart: unless-stopped
    environment:
      - SYSTEM_NAME=planning
      - TARGETS=planning_service:30050
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBITMQ_USER=${RABBITMQPLANNING_USER}
      - RABBITMQ_PASS=${RABBITMQPLANNING_PASS}
      - RABBITMQ_VHOST=/
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - planning-service
      - rabbitmq
    networks:
      - shift_net

  # ===========================================================================
  # SECTION 9: IDENTITY SERVICE – Master UUID Service
  # Port range: 30070–30100 (reserved)
  # Central service that assigns and resolves unique UUIDs across all systems.
  # Uses XML-RPC over RabbitMQ (fanout exchange).
  # NOTE: restart=always because this service is known to need reconnection
  # retries on startup. Team Identity is investigating the root cause.
  # ===========================================================================

  # STICKY ROLLBACK: ${IDENTITY_SERVICE_IMAGE} pin is set on crash
  identity-service:
    image: ${IDENTITY_SERVICE_IMAGE:-ghcr.io/integrationproject-groep1/identity-service:latest}
    container_name: identity-service
    restart: always
    environment:
      - DB_HOST=postgredb
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - RABBITMQ_HOST=rabbitmq_broker
      - RABBIT_HOST=rabbitmq_broker
      # Both variable names provided for compatibility with different pika versions
      - RABBIT_USER=${IDENTITY_RABBIT_USER}
      - RABBIT_PASS=${IDENTITY_RABBIT_PASS}
      - RABBITMQ_USER=${IDENTITY_RABBIT_USER}
      - RABBITMQ_PASS=${IDENTITY_RABBIT_PASS}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - postgredb
      - rabbitmq
    networks:
      - shift_net

# =============================================================================
# NETWORKS
# shift_net: Main application network – all services must be on this network
#            to reach RabbitMQ and each other.
# elk-net:   Isolated network for ELK components. Kibana and Logstash are on
#            both networks; Elasticsearch is only on elk-net + shift_net.
# =============================================================================
networks:
  shift_net:
    name: shiftfestival_network
  elk-net:
    name: elk-net

# =============================================================================
# VOLUMES
# Named volumes persist data across container restarts and redeployments.
# Volumes marked "external: true" must be created manually before first deploy:
#   docker volume create shiftfestival_rabbitmq_data
# =============================================================================
volumes:
  rabbitmq_data:
    external: true                       # Created manually – survives full stack removal
    name: shiftfestival_rabbitmq_data

  # Frontend (Drupal)
  frontend_db_data:
  frontend_drupal_files:
  frontend_drupal_config:

  # Facturatie (FOSSBilling)
  fossbilling_db_data:
  fossbilling_app_data:
  fossbilling_uploads:
  fossbilling_config:

  # Kassa (Odoo)
  kassa_db_data:
    name: shiftfestival_kassa_db_data
  kassa_odoo_data:
    name: shiftfestival_kassa_odoo_data
  kassa_outbox_data:
    name: shiftfestival_kassa_outbox_data

  # Monitoring (ELK)
  es-data:
  logstash-pipeline:

  # CRM
  crm_db_data:
    name: shiftfestival_crm_db_data