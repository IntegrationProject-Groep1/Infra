apiVersion: apps/v1
kind: Deployment
metadata:
  name: fossbilling-app
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fossbilling-app
  template:
    metadata:
      labels:
        app: fossbilling-app
    spec:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 0
      initContainers:
      - name: init-data-dirs
        image: busybox
        command: ["sh", "-c", "mkdir -p /data/cache /data/log /data/uploads && chmod 0775 /data/cache /data/log /data/uploads"]
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: foss-data
          mountPath: /data
      containers:
      - name: fossbilling
        image: fossbilling/fossbilling:latest
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "facturatie-db-service"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: foss-data
          mountPath: /var/www/html/data
        - name: foss-uploads
          mountPath: /var/www/html/data/uploads
        - name: apache-run
          mountPath: /var/run/apache2
        - name: apache-log
          mountPath: /var/log/apache2
        - name: apache-lock
          mountPath: /var/lock/apache2
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: foss-data
        persistentVolumeClaim:
          claimName: fossbilling-data-pvc
      - name: foss-uploads
        persistentVolumeClaim:
          claimName: fossbilling-uploads-pvc
      - name: apache-run
        emptyDir: {}
      - name: apache-log
        emptyDir: {}
      - name: apache-lock
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: facturatie-app-service
spec:
  selector:
    app: fossbilling-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturatie-connector
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: facturatie-connector
  template:
    metadata:
      labels:
        app: facturatie-connector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: connector
        image: ghcr.io/integrationproject-groep1/facturatie:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
        - name: BILLING_API_URL
          value: "http://facturatie-app-service/api"
        - name: TEAMS_WEBHOOK_FACTURATIE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TEAMS_WEBHOOK_FACTURATIE
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: SYSTEM_NAME
          value: "facturatie"
        - name: TARGETS
          value: "localhost:80"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
