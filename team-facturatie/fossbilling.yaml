apiVersion: apps/v1
kind: Deployment
metadata:
  name: fossbilling-app
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fossbilling-app
  template:
    metadata:
      labels:
        app: fossbilling-app
    spec:
      containers:
      - name: fossbilling
        image: fossbilling/fossbilling:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "facturatie-db-service"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: facturatie-app-service
spec:
  selector:
    app: fossbilling-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturatie-connector
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: facturatie-connector
  template:
    metadata:
      labels:
        app: facturatie-connector
    spec:
      containers:
      - name: connector
        image: ghcr.io/integrationproject-groep1/facturatie:latest
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
        - name: BILLING_API_URL
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: BILLING_API_URL
        - name: TEAMS_WEBHOOK_FACTURATIE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: TEAMS_WEBHOOK_FACTURATIE
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      - name: heartbeat
        image: ghcr.io/integrationproject-groep1/heartbeat:latest
        env:
        - name: SYSTEM_NAME
          value: "facturatie"
        - name: TARGETS
          value: "localhost:80"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: RABBITMQFACTURATIE_PASS
