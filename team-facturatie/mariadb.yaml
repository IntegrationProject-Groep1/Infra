apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturatie-db
  namespace: shift-festival
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: facturatie-db
  template:
    metadata:
      labels:
        app: facturatie-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: mariadb
        image: mariadb:10.11
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_ROOT_PASS
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_NAME
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shift-secrets
              key: FOSSBILLING_DB_PASS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: tmp
          mountPath: /tmp
        - name: run-mysql
          mountPath: /var/run/mysqld
        - name: mariadb-config
          mountPath: /etc/mysql/conf.d/custom.cnf
          subPath: custom.cnf
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: facturatie-db-data-pvc
      - name: tmp
        emptyDir: {}
      - name: run-mysql
        emptyDir: {}
      - name: mariadb-config
        configMap:
          name: facturatie-mariadb-config
---
apiVersion: v1
kind: Service
metadata:
  name: facturatie-db-service
spec:
  selector:
    app: facturatie-db
  ports:
    - port: 3306
      targetPort: 3306
